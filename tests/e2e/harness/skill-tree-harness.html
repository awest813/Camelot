<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Tree – Playwright Harness</title>
  <style>
    html, body {
      margin: 0;
      padding: 20px;
      background: #0a0604;
      font-family: sans-serif;
      color: #f0e8d0;
      min-height: 100vh;
    }

    h1 {
      font-size: 14px;
      color: #d4a017;
      margin: 0 0 12px;
      letter-spacing: 1px;
    }

    #notifications {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 300px;
    }

    .notification {
      background: rgba(0, 0, 0, 0.85);
      color: #f0e8d0;
      border: 1px solid rgba(212, 160, 23, 0.4);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 12px;
    }

    /* Import only the skill-tree CSS tokens from main.css via inline reset */
    .skill-tree-ui {
      position: static !important;
      max-width: 700px;
    }
  </style>
  <!--
    The Vite dev server will compile skill-tree-harness.ts on the fly so the
    full TypeScript module graph (SkillTreeSystem, SkillTreeUI, etc.) is
    available without a separate build step.
  -->
  <script type="module" src="./skill-tree-harness.ts"></script>
</head>
<body>
  <h1>SKILL TREE — PLAYWRIGHT AUDIT HARNESS</h1>
  <div id="notifications"></div>
  <!--
    The SkillTreeUI appends itself to document.body when show() is called.
    No extra mount point needed.
  -->
</body>
</html>
